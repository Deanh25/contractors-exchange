# Codespaces / Dev Containers stack for CX: a Node app container + a MariaDB the
# app talks to over the compose network (host "db"). The app process runs HERE,
# with real resources, instead of on a memory-starved laptop.
services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
    # Canonical Codespaces mount: the repo lands at /workspaces/<repo>.
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      DATABASE_URL: "mysql://root:cxdev@db:3306/contractors_exchange"
    depends_on:
      - db
    networks:
      - cx

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: cxdev
      MARIADB_DATABASE: contractors_exchange
    volumes:
      - cx-db-data:/var/lib/mysql
    networks:
      - cx

volumes:
  cx-db-data:

networks:
  cx:
